<style>
:root{

}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:'Kanit',sans-serif;background:radial-gradient(circle at top,#e8f8f0 0%,#f7fbf9 40%,#f2f6f5 100%);color:var(--ink)}
.app{max-width:520px;margin:0 auto;min-height:100vh;padding:0 16px 24px}
.hero{padding:24px 8px 16px}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.logo{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,var(--brand),var(--accent));display:grid;place-items:center;color:white;font-weight:700}
.hero h1{margin:0;font-size:24px}
.hero p{margin:4px 0 0;color:var(--muted)}
.stepper{display:flex;gap:10px;margin:16px 0 8px}
.step{flex:1;height:4px;border-radius:999px;background:var(--line)}
.step.active{background:linear-gradient(90deg,var(--brand),var(--accent))}
.card{background:var(--card);border-radius:20px;box-shadow:var(--shadow);padding:16px;margin-top:14px;border:1px solid #eef2f3}
.label{font-size:14px;color:var(--muted);margin:12px 0 6px}
.input{display:block;width:100%;padding:14px 16px;border-radius:14px;border:1px solid var(--line);font-family:'Kanit',sans-serif;font-size:16px;line-height:1.4;background:#fff;min-height:52px}
.input[readonly]{cursor:pointer}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.secondary.inline{width:auto;padding:10px 14px;font-size:14px}
.chips{display:flex;gap:10px;margin-top:6px}
.chip{flex:1;padding:12px;border-radius:14px;border:1px solid var(--line);background:#fff;cursor:pointer;text-align:center;font-weight:600;font-family:'Kanit',sans-serif}
.chip.active{border-color:var(--brand);background:#ecfdf3;color:#065f46;box-shadow:0 8px 18px rgba(24,160,94,.2)}
.primary{width:100%;padding:14px 16px;border:0;border-radius:16px;background:linear-gradient(135deg,var(--brand-dark),var(--brand));color:#fff;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 12px 24px rgba(24,160,94,.35);font-family:'Kanit',sans-serif}
.secondary{width:100%;padding:12px 16px;border:1px solid var(--line);border-radius:16px;background:#fff;color:var(--ink);font-size:15px;font-weight:500;cursor:pointer;font-family:'Kanit',sans-serif}
.helper{font-size:12px;color:var(--muted);margin-top:6px}
.summary-row{display:flex;justify-content:space-between;align-items:flex-start;margin-top:8px;gap:14px;font-size:14px}
.summary-row span:last-child{text-align:right;word-break:break-word;max-width:60%}
.map{width:100%;height:280px;border-radius:16px;overflow:hidden;margin-top:10px;background:#e5e7eb;border:2px solid transparent}
.map.fullscreen{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(calc(100vw - 24px),640px);height:min(72dvh,520px);margin:0;border-radius:24px;z-index:999;box-shadow:0 24px 60px rgba(15,23,42,.35);border:0}
.map-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;z-index:998;transition:opacity .2s ease}
.map-backdrop.show{opacity:1;pointer-events:auto}
.map-toolbar{position:fixed;top:calc(50% - min(36dvh,260px) + 14px);left:50%;transform:translateX(-50%);width:min(calc(100vw - 48px),592px);z-index:1000;display:none;gap:8px}
.map-toolbar.show{display:flex}
.map-toolbar input{flex:1;border-radius:12px;border:1px solid #d1d5db;padding:12px;font-family:'Kanit',sans-serif}
.map-hint{position:fixed;top:calc(50% + min(36dvh,260px) - 78px);left:50%;transform:translateX(-50%);width:min(calc(100vw - 48px),592px);z-index:1000;display:none}
.map-hint.show{display:block}
.map-hint .primary{width:100%;box-shadow:none}
.map.active-pickup{border-color:#0b6c3c}
.map.active-dropoff{border-color:#1aa7a1}
body.map-open{overflow:hidden}
.floater{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding:12px 14px;border-radius:14px;border:1px dashed #d1fae5;background:#f0fdf4;color:#065f46;font-size:13px;gap:14px}
@media (max-width:600px){.map{height:340px}.secondary.inline{width:100%}.map.fullscreen{width:calc(100vw - 18px);height:min(68dvh,440px);border-radius:20px}.map-toolbar{top:calc(50% - min(34dvh,220px) + 12px);width:calc(100vw - 36px)}.map-hint{top:calc(50% + min(34dvh,220px) - 74px);width:calc(100vw - 36px)}}

<script>
const TH = {
  defaultPlace: '\u0E2B\u0E2D\u0E19\u0E32\u0E2C\u0E34\u0E01\u0E32\u0E40\u0E17\u0E28\u0E1A\u0E32\u0E25\u0E40\u0E21\u0E37\u0E2D\u0E07\u0E40\u0E1A\u0E15\u0E07',
  pickupPrompt: '\u0E01\u0E33\u0E25\u0E31\u0E07\u0E40\u0E25\u0E37\u0E2D\u0E01\u0E08\u0E38\u0E14\u0E23\u0E31\u0E1A\u0E1C\u0E39\u0E49\u0E42\u0E14\u0E22\u0E2A\u0E32\u0E23',
  dropoffPrompt: '\u0E01\u0E33\u0E25\u0E31\u0E07\u0E40\u0E25\u0E37\u0E2D\u0E01\u0E1B\u0E25\u0E32\u0E22\u0E17\u0E32\u0E07',
  confirmPickup: '\u0E22\u0E37\u0E19\u0E22\u0E31\u0E19\u0E08\u0E38\u0E14\u0E23\u0E31\u0E1A\u0E1C\u0E39\u0E49\u0E42\u0E14\u0E22\u0E2A\u0E32\u0E23',
  confirmDropoff: '\u0E22\u0E37\u0E19\u0E22\u0E31\u0E19\u0E1B\u0E25\u0E32\u0E22\u0E17\u0E32\u0E07',
  statusReady: '\u0E1E\u0E23\u0E49\u0E2D\u0E21\u0E44\u0E1B\u0E15\u0E48\u0E2D',
  statusEstimating: '\u0E01\u0E33\u0E25\u0E31\u0E07\u0E04\u0E33\u0E19\u0E27\u0E13\u0E23\u0E30\u0E22\u0E30\u0E17\u0E32\u0E07\u0E41\u0E25\u0E30\u0E23\u0E32\u0E04\u0E32',
  notFound: '\u0E44\u0E21\u0E48\u0E1E\u0E1A\u0E17\u0E35\u0E48\u0E2D\u0E22\u0E39\u0E48',
  etaPrefix: 'ETA',
  minute: '\u0E19\u0E32\u0E17\u0E35',
  distance: '\u0E23\u0E30\u0E22\u0E30\u0E17\u0E32\u0E07',
  km: '\u0E01\u0E21.',
  baht: '\u0E1A\u0E32\u0E17',
  motorcycle: '\u0E21\u0E2D\u0E40\u0E15\u0E2D\u0E23\u0E4C\u0E44\u0E0B\u0E04\u0E4C',
  car: '\u0E23\u0E16\u0E22\u0E19\u0E15\u0E4C'
};

const pickupSearchField = document.getElementById('pickupSearchField');
const dropoffSearchField = document.getElementById('dropoffSearchField');
const pickupCurrentBtn = document.getElementById('pickupCurrentBtn');
const pickupText = document.getElementById('pickupText');
const dropoffText = document.getElementById('dropoffText');
const nextBtn = document.getElementById('nextBtn');
const mapEl = document.getElementById('map');
const activeHint = document.getElementById('activeHint');
const mapBackdrop = document.getElementById('mapBackdrop');
const mapToolbar = document.getElementById('mapToolbar');
const mapSearch = document.getElementById('mapSearch');
const closeMapBtn = document.getElementById('closeMap');
const mapHint = document.getElementById('mapHint');
const confirmPoint = document.getElementById('confirmPoint');
const etaText = document.getElementById('etaText');
const distanceText = document.getElementById('distanceText');
const fareText = document.getElementById('fareText');

let map;
let geocoder;
let pickupMarker;
let dropoffMarker;
let directionsService;
let directionsRenderer;
let activeField = 'pickup';
let distanceKm = null;
let etaMinutes = null;

const DEFAULT_CENTER = { lat: 5.77434, lng: 101.07231 };
const VEHICLE_PRICING = {
  [TH.motorcycle]: { base: 35, perKm: 8 },
  [TH.car]: { base: 60, perKm: 12 }
};

function toRadians(value){
  return value * Math.PI / 180;
}

function getStraightDistanceKm(origin, destination){
  const lat1 = typeof origin.lat === 'function' ? origin.lat() : origin.lat;
  const lng1 = typeof origin.lng === 'function' ? origin.lng() : origin.lng;
  const lat2 = typeof destination.lat === 'function' ? destination.lat() : destination.lat;
  const lng2 = typeof destination.lng === 'function' ? destination.lng() : destination.lng;
  const earthRadiusKm = 6371;
  const dLat = toRadians(lat2 - lat1);
  const dLng = toRadians(lng2 - lng1);
  const a =
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(toRadians(lat1)) * Math.cos(toRadians(lat2)) *
    Math.sin(dLng / 2) * Math.sin(dLng / 2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return earthRadiusKm * c;
}

function getAddressComponent(components, type){
  const match = (components || []).find((component) => component.types && component.types.includes(type));
  return match ? match.long_name : '';
}

function joinAddressParts(parts){
  return parts.filter(Boolean).join(' ').replace(/\s+/g, ' ').trim();
}

function buildDisplayAddress(result){
  const components = result && result.address_components ? result.address_components : [];
  const streetNumber = getAddressComponent(components, 'street_number');
  const route = getAddressComponent(components, 'route');
  const sublocality =
    getAddressComponent(components, 'sublocality_level_1') ||
    getAddressComponent(components, 'sublocality') ||
    getAddressComponent(components, 'neighborhood');
  const locality =
    getAddressComponent(components, 'locality') ||
    getAddressComponent(components, 'postal_town');
  const district =
    getAddressComponent(components, 'administrative_area_level_2') ||
    getAddressComponent(components, 'administrative_area_level_3');
  const province = getAddressComponent(components, 'administrative_area_level_1');
  const postalCode = getAddressComponent(components, 'postal_code');

  const line1 = joinAddressParts([streetNumber, route]);
  const line2 = sublocality ? '\u0E15.' + sublocality : '';
  const line3 = locality ? '\u0E2D.' + locality : '';
  const line4 = province || district || '';
  const line5 = postalCode || '';
  const address = joinAddressParts([line1, line2, line3, line4, line5]);

  if(address){
    return address;
  }

  return result && result.formatted_address
    ? result.formatted_address.replace(/^[A-Z0-9+]{4,}\s*/i, '').replace(/\s*\u0E1B\u0E23\u0E30\u0E40\u0E17\u0E28\u0E44\u0E17\u0E22$/, '').trim()
    : TH.notFound;
}

function getDisplayAddress(results){
  const preferred = (results || []).find((result) => {
    const formatted = result && result.formatted_address ? result.formatted_address : '';
    return formatted && !/^[A-Z0-9+]{4,}\s/i.test(formatted);
  }) || results[0];
  return buildDisplayAddress(preferred);
}

function getSelectedVehicle(){
  return document.querySelector('#vehicleChips .chip.active')?.dataset.vehicle || TH.motorcycle;
}

function getEstimatedFare(){
  if(distanceKm === null){
    return null;
  }
  const pricing = VEHICLE_PRICING[getSelectedVehicle()] || VEHICLE_PRICING[TH.motorcycle];
  return Math.round(pricing.base + (distanceKm * pricing.perKm));
}

function updateEstimate(){
  if(distanceKm === null){
    etaText.textContent = `${TH.etaPrefix} -`;
    distanceText.textContent = `${TH.distance} -`;
    fareText.textContent = '-';
    return;
  }
  const estimatedFare = getEstimatedFare();
  etaText.textContent = etaMinutes ? `${TH.etaPrefix} ${etaMinutes} ${TH.minute}` : `${TH.etaPrefix} -`;
  distanceText.textContent = `${TH.distance} ${distanceKm.toFixed(1)} ${TH.km}`;
  fareText.textContent = estimatedFare !== null ? `${estimatedFare.toLocaleString('th-TH')} ${TH.baht}` : '-';
}

function updateStorage(){
  const payload = {
    pickupAddress: pickupText.textContent === '-' ? '' : pickupText.textContent,
    dropoffAddress: dropoffText.textContent === '-' ? '' : dropoffText.textContent,
    pickupLat: pickupMarker ? pickupMarker.getPosition().lat() : null,
    pickupLng: pickupMarker ? pickupMarker.getPosition().lng() : null,
    dropoffLat: dropoffMarker ? dropoffMarker.getPosition().lat() : null,
    dropoffLng: dropoffMarker ? dropoffMarker.getPosition().lng() : null,
    vehicle: getSelectedVehicle(),
    distanceKm,
    etaMinutes,
    estimatedFare: getEstimatedFare()
  };
  localStorage.setItem('ride_step1', JSON.stringify(payload));
}

function calcRoute(){
  if(!pickupMarker || !dropoffMarker){
    distanceKm = null;
    etaMinutes = null;
    directionsRenderer.set('directions', null);
    activeHint.textContent = activeField === 'pickup' ? TH.pickupPrompt : TH.dropoffPrompt;
    updateEstimate();
    updateStorage();
    syncButton();
    return;
  }

  activeHint.textContent = TH.statusEstimating;
  distanceKm = getStraightDistanceKm(pickupMarker.getPosition(), dropoffMarker.getPosition());
  etaMinutes = Math.max(1, Math.round((distanceKm / 28) * 60));
  updateEstimate();
  updateStorage();
  syncButton();

  directionsService.route({
    origin: pickupMarker.getPosition(),
    destination: dropoffMarker.getPosition(),
    travelMode: google.maps.TravelMode.DRIVING
  }, (result, status) => {
    if(status !== 'OK' || !result.routes || !result.routes[0]){
      activeHint.textContent = TH.statusReady;
      updateStorage();
      syncButton();
      return;
    }

    directionsRenderer.setDirections(result);
    const leg = result.routes[0].legs[0];
    distanceKm = leg.distance.value / 1000;
    etaMinutes = Math.max(1, Math.round(leg.duration.value / 60));
    activeHint.textContent = TH.statusReady;
    updateEstimate();
    updateStorage();
    syncButton();
  });
}

function setMarker(position, type){
  if(type === 'pickup'){
    if(!pickupMarker){
      pickupMarker = new google.maps.Marker({ map, position, label:'A', draggable:true });
      pickupMarker.addListener('dragend', () => handleDraggedMarker('pickup'));
    } else {
      pickupMarker.setPosition(position);
    }
  } else {
    if(!dropoffMarker){
      dropoffMarker = new google.maps.Marker({ map, position, label:'B', draggable:true });
      dropoffMarker.addListener('dragend', () => handleDraggedMarker('dropoff'));
    } else {
      dropoffMarker.setPosition(position);
    }
  }
  map.panTo(position);
  calcRoute();
}

function handleDraggedMarker(type){
  const marker = type === 'pickup' ? pickupMarker : dropoffMarker;
  if(!marker) return;
  reverseGeocode(marker.getPosition(), (address) => {
    if(type === 'pickup'){
      pickupText.textContent = address;
    } else {
      dropoffText.textContent = address;
    }
    updateStorage();
    fitBoundsIfReady();
    syncButton();
  });
}

function setActiveField(type){
  activeField = type;
  if(type === 'pickup'){
    mapEl.classList.add('active-pickup');
    mapEl.classList.remove('active-dropoff');
    activeHint.textContent = TH.pickupPrompt;
    confirmPoint.textContent = TH.confirmPickup;
  } else {
    mapEl.classList.add('active-dropoff');
    mapEl.classList.remove('active-pickup');
    activeHint.textContent = TH.dropoffPrompt;
    confirmPoint.textContent = TH.confirmDropoff;
  }
}

function fitBoundsIfReady(){
  if(pickupMarker && dropoffMarker){
    const bounds = new google.maps.LatLngBounds();
    bounds.extend(pickupMarker.getPosition());
    bounds.extend(dropoffMarker.getPosition());
    map.fitBounds(bounds, 40);
  }
}

function reverseGeocode(latLng, cb){
  geocoder.geocode({ location: latLng }, (results, status) => {
    if(status === 'OK' && results && results[0]){
      cb(getDisplayAddress(results));
      return;
    }
    cb(TH.notFound);
  });
}

function syncVehicle(){
  const savedVehicle = getSelectedVehicle();
  document.querySelectorAll('#vehicleChips .chip').forEach((chip) => {
    chip.classList.toggle('active', chip.dataset.vehicle === savedVehicle);
  });
  updateEstimate();
  updateStorage();
}

function syncButton(){
  const ok = pickupText.textContent.trim() !== '-' && dropoffText.textContent.trim() !== '-' && distanceKm !== null;
  nextBtn.disabled = !ok;
}

window.initMap = function initMap(){
  map = new google.maps.Map(mapEl, {
    center: DEFAULT_CENTER,
    zoom: 13,
    disableDefaultUI: true,
    zoomControl: true
  });

  geocoder = new google.maps.Geocoder();
  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer({ map, suppressMarkers: true, preserveViewport: true });

  const searchAuto = new google.maps.places.Autocomplete(mapSearch);
  searchAuto.bindTo('bounds', map);
  searchAuto.addListener('place_changed', () => {
    const place = searchAuto.getPlace();
    if(!place.geometry){
      return;
    }
    const target = activeField || 'pickup';
    setMarker(place.geometry.location, target);
    const address = buildDisplayAddress(place) || mapSearch.value.trim();
    if(target === 'pickup') pickupText.textContent = address;
    if(target === 'dropoff') dropoffText.textContent = address;
    updateStorage();
    fitBoundsIfReady();
    syncButton();
  });

  map.addListener('click', (e) => {
    const target = activeField || (!pickupMarker ? 'pickup' : 'dropoff');
    setMarker(e.latLng, target);
    reverseGeocode(e.latLng, (address) => {
      if(target === 'pickup') pickupText.textContent = address;
      if(target === 'dropoff') dropoffText.textContent = address;
      updateStorage();
      fitBoundsIfReady();
      syncButton();
    });
  });

  try{
    const saved = JSON.parse(localStorage.getItem('ride_step1') || '{}');
    if(saved.pickupAddress) pickupText.textContent = saved.pickupAddress;
    if(saved.dropoffAddress) dropoffText.textContent = saved.dropoffAddress;
    if(saved.vehicle){
      document.querySelectorAll('#vehicleChips .chip').forEach((chip) => {
        chip.classList.toggle('active', chip.dataset.vehicle === saved.vehicle);
      });
    }
    if(saved.pickupLat && saved.pickupLng){
      setMarker(new google.maps.LatLng(saved.pickupLat, saved.pickupLng), 'pickup');
    }
    if(saved.dropoffLat && saved.dropoffLng){
      setMarker(new google.maps.LatLng(saved.dropoffLat, saved.dropoffLng), 'dropoff');
    }
    if(saved.distanceKm !== null && saved.distanceKm !== undefined){
      distanceKm = Number(saved.distanceKm);
    }
    if(saved.etaMinutes !== null && saved.etaMinutes !== undefined){
      etaMinutes = Number(saved.etaMinutes);
    }
    updateEstimate();
    if(saved.pickupLat && saved.pickupLng && saved.dropoffLat && saved.dropoffLng){
      fitBoundsIfReady();
      activeHint.textContent = TH.statusReady;
    }
  } catch(e) {}

  if((pickupText.textContent === '-' || !pickupText.textContent.trim()) && !pickupMarker){
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const loc = new google.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
          map.setCenter(loc);
          setActiveField('pickup');
          setMarker(loc, 'pickup');
          reverseGeocode(loc, (address) => {
            pickupText.textContent = address;
            updateStorage();
            syncButton();
          });
        },
        () => {
          geocoder.geocode({ address: TH.defaultPlace }, (results, status) => {
            if(status === 'OK' && results && results[0]){
              const loc = results[0].geometry.location;
              map.setCenter(loc);
              setActiveField('pickup');
              setMarker(loc, 'pickup');
              pickupText.textContent = buildDisplayAddress(results[0]) || pickupText.textContent;
              updateStorage();
              syncButton();
            }
          });
        },
        { enableHighAccuracy:true, timeout:8000, maximumAge:60000 }
      );
    }
  }

  syncButton();
};

function useCurrentLocation(){
  if(!navigator.geolocation){
    return;
  }
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const loc = new google.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
      setActiveField('pickup');
      setMarker(loc, 'pickup');
      reverseGeocode(loc, (address) => {
        pickupText.textContent = address;
        pickupSearchField.value = address;
        updateStorage();
        syncButton();
      });
    },
    () => {},
    { enableHighAccuracy:true, timeout:8000, maximumAge:60000 }
  );
}
function openMap(type){
  setActiveField(type);
  document.body.classList.add('map-open');
  mapBackdrop.classList.add('show');
  mapEl.classList.add('fullscreen');
  mapToolbar.classList.add('show');
  mapHint.classList.add('show');
  mapSearch.value = '';
  setTimeout(() => {
    google.maps.event.trigger(map, 'resize');
    if(type === 'pickup' && pickupMarker) map.panTo(pickupMarker.getPosition());
    if(type === 'dropoff' && dropoffMarker) map.panTo(dropoffMarker.getPosition());
  }, 50);
}

function closeMap(){
  document.body.classList.remove('map-open');
  mapBackdrop.classList.remove('show');
  mapEl.classList.remove('fullscreen');
  mapToolbar.classList.remove('show');
  mapHint.classList.remove('show');
}

pickupSearchField.addEventListener('click', () => openMap('pickup'));
dropoffSearchField.addEventListener('click', () => openMap('dropoff'));
pickupSearchField.addEventListener('focus', () => openMap('pickup'));
dropoffSearchField.addEventListener('focus', () => openMap('dropoff'));
pickupCurrentBtn.addEventListener('click', useCurrentLocation);
mapBackdrop.addEventListener('click', closeMap);
closeMapBtn.addEventListener('click', closeMap);
confirmPoint.addEventListener('click', closeMap);
nextBtn.addEventListener('click', () => {
  const pickup = pickupText.textContent.trim();
  const dropoff = dropoffText.textContent.trim();
  if(!pickup || !dropoff || pickup === '-' || dropoff === '-' || distanceKm === null){
    syncButton();
    return;
  }
  updateStorage();
  window.location.href = 'ride2.html';
});

document.querySelectorAll('#vehicleChips .chip').forEach((chip) => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('#vehicleChips .chip').forEach((c) => c.classList.remove('active'));
    chip.classList.add('active');
    syncVehicle();
  });
});
</script>
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB4eIoOargBmLJWifYrlTcSklmi7IqtyA8&libraries=places&callback=initMap"></script>
