<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>&#x0E22;&#x0E37;&#x0E19;&#x0E22;&#x0E31;&#x0E19;&#x0E01;&#x0E32;&#x0E23;&#x0E40;&#x0E23;&#x0E35;&#x0E22;&#x0E01;&#x0E23;&#x0E16;</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#18a05e;
  --brand-dark:#0b6c3c;
  --accent:#1aa7a1;
  --ink:#0f172a;
  --muted:#6b7280;
  --card:#ffffff;
  --line:#e5e7eb;
  --shadow:0 18px 40px rgba(15,23,42,.08);
}
*{box-sizing:border-box}
body{margin:0;font-family:'Kanit',sans-serif;background:radial-gradient(circle at top,#e8f8f0 0%,#f7fbf9 40%,#f2f6f5 100%);color:var(--ink)}
.app{max-width:520px;margin:0 auto;min-height:100vh;padding:0 16px 24px}
.hero{padding:24px 8px 16px}
.hero h1{margin:0;font-size:24px}
.hero p{margin:4px 0 0;color:var(--muted)}
.stepper{display:flex;gap:10px;margin:16px 0 8px}
.step{flex:1;height:4px;border-radius:999px;background:var(--line)}
.step.active{background:linear-gradient(90deg,var(--brand),var(--accent))}
.card{background:var(--card);border-radius:20px;box-shadow:var(--shadow);padding:16px;margin-top:14px;border:1px solid #eef2f3}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px dashed #eef2f3;font-size:15px;gap:14px}
.row:last-child{border-bottom:0}
.row span:last-child{text-align:right;max-width:58%;word-break:break-word}
.price{font-size:26px;font-weight:700;color:#065f46}
.primary{width:100%;padding:14px 16px;border:0;border-radius:16px;background:linear-gradient(135deg,var(--brand-dark),var(--brand));color:#fff;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 12px 24px rgba(24,160,94,.35);font-family:'Kanit',sans-serif}
.secondary{width:100%;padding:12px 16px;border:1px solid var(--line);border-radius:16px;background:#fff;color:var(--ink);font-size:15px;font-weight:500;cursor:pointer;font-family:'Kanit',sans-serif}
.badge{display:inline-flex;align-items:center;gap:6px;background:#ecfdf3;color:#065f46;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:600}
</style>
</head>
<body>
  <div class="app">
    <header class="hero">
      <h1>&#x0E22;&#x0E37;&#x0E19;&#x0E22;&#x0E31;&#x0E19;&#x0E01;&#x0E32;&#x0E23;&#x0E40;&#x0E23;&#x0E35;&#x0E22;&#x0E01;&#x0E23;&#x0E16;</h1>
      <p>&#x0E15;&#x0E23;&#x0E27;&#x0E08;&#x0E2A;&#x0E2D;&#x0E1A;&#x0E23;&#x0E32;&#x0E22;&#x0E25;&#x0E30;&#x0E40;&#x0E2D;&#x0E35;&#x0E22;&#x0E14;&#x0E01;&#x0E48;&#x0E2D;&#x0E19;&#x0E22;&#x0E37;&#x0E19;&#x0E22;&#x0E31;&#x0E19;</p>
      <div class="stepper">
        <div class="step active"></div>
        <div class="step active"></div>
        <div class="step active"></div>
      </div>
    </header>

    <section class="card" id="summary"></section>

    <section class="card">
      <div class="row">
        <span>&#x0E04;&#x0E48;&#x0E32;&#x0E42;&#x0E14;&#x0E22;&#x0E2A;&#x0E32;&#x0E23;&#x0E1B;&#x0E23;&#x0E30;&#x0E21;&#x0E32;&#x0E13;</span>
        <span class="price">-</span>
      </div>
      <div class="row">
        <span>&#x0E23;&#x0E30;&#x0E22;&#x0E30;&#x0E17;&#x0E32;&#x0E07;</span>
        <span id="distanceValue">-</span>
      </div>
      <div class="row">
        <span>&#x0E40;&#x0E27;&#x0E25;&#x0E32;&#x0E23;&#x0E31;&#x0E1A;&#x0E42;&#x0E14;&#x0E22;&#x0E1B;&#x0E23;&#x0E30;&#x0E21;&#x0E32;&#x0E13;</span>
        <span id="etaValue">-</span>
      </div>
      <div class="row">
        <span>&#x0E2A;&#x0E16;&#x0E32;&#x0E19;&#x0E30;</span>
        <span class="badge">&#x0E1E;&#x0E23;&#x0E49;&#x0E2D;&#x0E21;&#x0E04;&#x0E49;&#x0E19;&#x0E2B;&#x0E32;&#x0E04;&#x0E19;&#x0E02;&#x0E31;&#x0E1A;</span>
      </div>
    </section>

    <section class="card">
      <button class="primary" onclick="confirmRide()">&#x0E22;&#x0E37;&#x0E19;&#x0E22;&#x0E31;&#x0E19;&#x0E40;&#x0E23;&#x0E35;&#x0E22;&#x0E01;&#x0E23;&#x0E16;</button>
      <div style="height:10px"></div>
      <button class="secondary" onclick="back()">&#x0E22;&#x0E49;&#x0E2D;&#x0E19;&#x0E01;&#x0E25;&#x0E31;&#x0E1A;</button>
    </section>
  </div>

<script>
const TH = {
  motorcycle: '\u0E21\u0E2D\u0E40\u0E15\u0E2D\u0E23\u0E4C\u0E44\u0E0B\u0E04\u0E4C',
  car: '\u0E23\u0E16\u0E22\u0E19\u0E15\u0E4C',
  baht: '\u0E1A\u0E32\u0E17',
  km: '\u0E01\u0E21.',
  minute: '\u0E19\u0E32\u0E17\u0E35',
  success: '\u0E40\u0E23\u0E35\u0E22\u0E01\u0E23\u0E16\u0E2A\u0E33\u0E40\u0E23\u0E47\u0E08! \u0E04\u0E19\u0E02\u0E31\u0E1A\u0E01\u0E33\u0E25\u0E31\u0E07\u0E21\u0E38\u0E48\u0E07\u0E2B\u0E19\u0E49\u0E32\u0E44\u0E1B\u0E2B\u0E32\u0E04\u0E38\u0E13'
};

const s1 = JSON.parse(localStorage.getItem('ride_step1') || '{}');
const s2 = JSON.parse(localStorage.getItem('ride_step2') || '{}');

if(!s1.pickupAddress || !s1.dropoffAddress){
  window.location.href = 'index.html';
}
if(!s2.name || !s2.phone){
  window.location.href = 'ride2.html';
}

function escapeHtml(value){
  return String(value || '-')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

const fallbackFare = s1.vehicle === TH.car ? 220 : 165;
const estimatedFare = Number(s1.estimatedFare || fallbackFare);
const distanceKm = s1.distanceKm ? Number(s1.distanceKm) : null;
const etaMinutes = s1.etaMinutes ? Number(s1.etaMinutes) : null;

document.getElementById('summary').innerHTML = `
  <div class="row"><span>&#x0E08;&#x0E38;&#x0E14;&#x0E23;&#x0E31;&#x0E1A;</span><span>${escapeHtml(s1.pickupAddress)}</span></div>
  <div class="row"><span>&#x0E1B;&#x0E25;&#x0E32;&#x0E22;&#x0E17;&#x0E32;&#x0E07;</span><span>${escapeHtml(s1.dropoffAddress)}</span></div>
  <div class="row"><span>&#x0E1B;&#x0E23;&#x0E30;&#x0E40;&#x0E20;&#x0E17;&#x0E23;&#x0E16;</span><span>${escapeHtml(s1.vehicle)}</span></div>
  <div class="row"><span>&#x0E1C;&#x0E39;&#x0E49;&#x0E42;&#x0E14;&#x0E22;&#x0E2A;&#x0E32;&#x0E23;</span><span>${escapeHtml(s2.name)}</span></div>
  <div class="row"><span>&#x0E40;&#x0E1A;&#x0E2D;&#x0E23;&#x0E4C;&#x0E42;&#x0E17;&#x0E23;</span><span>${escapeHtml(s2.phone)}</span></div>
  <div class="row"><span>&#x0E08;&#x0E33;&#x0E19;&#x0E27;&#x0E19;&#x0E04;&#x0E19;</span><span>${escapeHtml(s2.people)}</span></div>
  <div class="row"><span>&#x0E2B;&#x0E21;&#x0E32;&#x0E22;&#x0E40;&#x0E2B;&#x0E15;&#x0E38;</span><span>${escapeHtml(s2.note)}</span></div>
`;

document.querySelector('.price').textContent = `${estimatedFare.toLocaleString('th-TH')} ${TH.baht}`;
document.getElementById('distanceValue').textContent = distanceKm !== null ? `${distanceKm.toFixed(1)} ${TH.km}` : '-';
document.getElementById('etaValue').textContent = etaMinutes !== null ? `${etaMinutes} ${TH.minute}` : `5-7 ${TH.minute}`;

function confirmRide(){
  const rideDraft = {
    service_type: 'ride',
    pickup_address: s1.pickupAddress || '',
    dropoff_address: s1.dropoffAddress || '',
    pickup_lat: s1.pickupLat || null,
    pickup_lng: s1.pickupLng || null,
    dropoff_lat: s1.dropoffLat || null,
    dropoff_lng: s1.dropoffLng || null,
    distance_km: distanceKm || 0,
    eta_minutes: etaMinutes || null,
    vehicle_type: s1.vehicle || '',
    customer_name: s2.name || '',
    customer_phone: s2.phone || '',
    passenger_count: s2.people || '',
    customer_note: s2.note || '',
    estimated_fare: estimatedFare,
    submitted_at: new Date().toISOString(),
    created_from: 'ride-prototype'
  };

  localStorage.setItem('ride_last_submission', JSON.stringify(rideDraft));
  alert(TH.success);
  localStorage.removeItem('ride_step1');
  localStorage.removeItem('ride_step2');
  window.location.href = 'index.html';
}

function back(){
  window.location.href = 'ride2.html';
}
</script>
</body>
</html>
